<!DOCTYPE html>
<html lang="pt-br">

<head>

<body>

        <h1>Sistema de Inventario</h1>

    <aside>

                </div>
            </div>
            <div class="grafico">
                <label for="graficoPizza">Gráfico Pizza</label>

                    <canvas id="graficoPizza"></canvas>

            </div>
        </article>
        <section>
        </section>

    <footer></footer>
